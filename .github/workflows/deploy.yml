name: Model Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
      MODEL_VERSION: ${{ vars.MODEL_VERSION || 'v1.1.0' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pytest -q --maxfail=1
          python ml_pipeline.py --model-out models/model.joblib --metrics-out reports/offline_metrics.json
          python model_gate.py --metrics reports/offline_metrics.json --policy policies/model_policy.yaml

      - name: Build Docker image
        run: |
          docker build \
            --build-arg MODEL_VERSION="${MODEL_VERSION}" \
            -t "${IMAGE_NAME}:${{ github.sha }}" \
            -t "${IMAGE_NAME}:${MODEL_VERSION}" \
            .

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push Docker image
        run: |
          docker push "${IMAGE_NAME}:${{ github.sha }}"
          docker push "${IMAGE_NAME}:${MODEL_VERSION}"

      - name: Deploy via API
        env:
          CLOUD_TOKEN: ${{ secrets.CLOUD_TOKEN }}
          DEPLOY_API_URL: ${{ secrets.DEPLOY_API_URL }}
        run: |
          if [ -z "${CLOUD_TOKEN}" ] || [ -z "${DEPLOY_API_URL}" ]; then
            echo "No cloud endpoint configured. Demo deploy is marked as skipped after successful build/push."
            echo "image=${IMAGE_NAME}:${{ github.sha }}"
            exit 0
          fi

          curl -fsS -X POST "${DEPLOY_API_URL}" \
            -H "Authorization: Bearer ${CLOUD_TOKEN}" \
            -d "image=${IMAGE_NAME}:${{ github.sha }}" \
            -d "model_version=${MODEL_VERSION}"

      - uses: actions/upload-artifact@v4
        with:
          name: deployment-reports
          path: reports/**
