services:
  ml-blue:
    build:
      context: .
    image: ml-ops-hw7:v1.0.0
    container_name: ml-ops-hw7-blue
    environment:
      MODEL_VERSION: v1.0.0
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
